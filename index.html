<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta
      name="description"
      content="Black Room Rave - a dark, minimal, underground online room with continuous techno radio."
    />
    <title>Black Room Rave</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css?v=20260308-21" />
  </head>
  <body>
    <div class="radio-status" id="radio-status" aria-live="polite">
      <span class="radio-status-dot" aria-hidden="true"></span>
      <span class="radio-status-label">radio</span>
    </div>

    <main class="page" aria-label="Black Room Rave">
      <aside class="god-panel god-panel-left" id="god-panel-left" aria-label="God Mode technical panel">
        <p class="god-title">God Mode / System</p>
        <div class="god-grid">
          <div class="god-item">
            <span>current listeners</span>
            <strong id="admin-current-listeners">--</strong>
          </div>
          <div class="god-item">
            <span>max concurrent</span>
            <strong id="admin-max-listeners">--</strong>
          </div>
          <div class="god-item">
            <span>total sessions</span>
            <strong id="admin-total-sessions">--</strong>
          </div>
          <div class="god-item">
            <span>server uptime</span>
            <strong id="admin-uptime">--</strong>
          </div>
          <div class="god-item">
            <span>bootstrap</span>
            <strong id="admin-bootstrap">--</strong>
          </div>
          <div class="god-item">
            <span>live track index</span>
            <strong id="admin-live-track">--</strong>
          </div>
        </div>
      </aside>

      <section class="room room-visible" id="room" aria-label="Black Room Rave radio room">
        <div class="room-inner">
          <header class="room-header">
            <img
              src="assets/6alb.png"
              alt="Black Room Rave logo"
              class="room-logo"
              id="room-logo"
              role="button"
              tabindex="0"
              aria-label="Toggle God Mode"
            />
          </header>

          <div class="room-visualizer-wrapper">
            <div class="visualizer" id="visualizer" aria-hidden="true">
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
              <div class="bar"></div>
            </div>
          </div>

          <footer class="room-footer" aria-live="polite">
            <button type="button" class="transport-button" id="transport-button">
              Play
            </button>
            <input
              type="range"
              class="volume-slider"
              id="volume-slider"
              min="0"
              max="100"
              value="100"
              aria-label="volume"
            />
            <p class="track-label">now playing</p>
            <p class="track-title" id="track-title">&nbsp;</p>
          </footer>
        </div>

        <iframe
          id="sc-player"
          title="Black Room Rave Radio"
          class="sc-iframe"
          width="100%"
          height="166"
          scrolling="no"
          frameborder="0"
          allow="autoplay"
          src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/trommelmusic/sets/trommel-podcast&color=%23000000&auto_play=false&continuous_play=true&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=true"
        ></iframe>
      </section>

      <aside class="god-panel god-panel-right" id="god-panel-right" aria-label="God Mode playlist panel">
        <p class="god-title">Playlist / Rotation</p>
        <div class="playlist-controls">
          <button class="playlist-btn" id="admin-load-playlist" type="button">Load SC</button>
          <button class="playlist-btn" id="admin-shuffle-playlist" type="button">Shuffle</button>
          <button class="playlist-btn" id="admin-reset-playlist" type="button">Reset</button>
        </div>
        <p class="playlist-status" id="admin-playlist-status">waiting for playlist...</p>
        <iframe id="admin-sc-plugin" class="god-sc-plugin" title="SoundCloud playlist plugin" width="100%" height="166" scrolling="no" frameborder="0" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/trommelmusic/sets/trommel-podcast"></iframe>
        <ul class="playlist-list" id="admin-playlist-list"></ul>
      </aside>
    </main>

    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script src="script.js?v=20260309-12" defer></script>
  </body>
</html>
